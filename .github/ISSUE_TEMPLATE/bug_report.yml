name: Rapport de Bug
description: Signaler une erreur ou un dysfonctionnement.
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler ce bug ! Votre aide est précieuse pour stabiliser AfriTest.
  - type: textarea
    id: description
    attributes:
      label: Description du Bug
      description: Un résumé clair et concis du problème.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes pour Reproduire
      description: Comment pouvons-nous voir le problème par nous-mêmes ?
      placeholder: |
        1. Allez sur '...'
        2. Cliquez sur '....'
        3. Voir l'erreur
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement Attendu
      description: Ce qui aurait dû se passer.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: OS, version du navigateur, version PHP/Laravel, etc.
